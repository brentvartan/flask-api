services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flask_api_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5433 on host to avoid conflict with Postgres.app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flask_api_dev
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: dev-jwt-secret-key
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade && python run.py"

volumes:
  postgres_data:
